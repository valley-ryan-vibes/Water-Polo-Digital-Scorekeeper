<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk Duty: Pro Simulator</title>
    <style>
        /* Core Styles */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        button { padding: 15px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; margin: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        
        /* Setup Screen */
        #setup-screen { background: white; padding: 40px; border-radius: 10px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .camera-btn { background-color: #34495e; width: 100%; margin-top: 15px; display: block; }
        .settings-group { margin: 25px 0; background: #ecf0f1; padding: 20px; border-radius: 5px; text-align: left; border: 1px solid #bdc3c7; }
        select { padding: 10px; font-size: 1.1em; border-radius: 5px; border: 1px solid #bdc3c7; width: 100%; margin-top: 5px; margin-bottom: 15px; }
        
        /* Dashboard */
        .dashboard { display: flex; justify-content: space-around; align-items: center; background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .clock-section { display: flex; flex-direction: column; align-items: center; }
        .clock { font-size: 4em; font-family: monospace; font-weight: bold; background: black; color: #e74c3c; padding: 10px 20px; border-radius: 5px; }
        .shot-clock { color: #f1c40f; }
        .quarter-badge { background: #3498db; padding: 5px 15px; border-radius: 15px; font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        
        /* Game Controls */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 800px; margin: 0 auto; }
        .btn-white { background-color: #ecf0f1; color: #2c3e50; border: 2px solid #bdc3c7; }
        .btn-dark { background-color: #2c3e50; color: white; }
        .btn-clock { background-color: #e67e22; grid-column: span 2; }
        .btn-timeout { background-color: #f39c12; }
        .btn-quarter { background-color: #9b59b6; grid-column: span 2; }
        
        /* Modals & Keypad */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .keypad { background: white; padding: 20px; border-radius: 10px; width: 300px; }
        .keypad-display { background: #ecf0f1; padding: 15px; font-size: 2em; margin-bottom: 15px; border-radius: 5px; min-height: 40px; color: #333; }
        .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .keys button { background: #3498db; font-size: 1.5em; padding: 20px 0; }
        .keys .btn-clear { background: #e74c3c; }
        .keys .btn-enter { background: #2ecc71; grid-column: span 2; }
        .camera-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; }
        video { width: 100%; border-radius: 5px; background: black; margin-bottom: 15px; }
        .warning-box { background: #c0392b; color: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .warning-box h1 { font-size: 4em; margin: 0; }
        .warning-box button { background: white; color: #c0392b; width: 100%; margin-top: 20px; font-size: 1.2em; }

        /* Real-Time Scorecard Container */
        .scorecard-wrapper { margin-top: 30px; background: #fff; padding: 15px; border-radius: 5px; border: 2px solid #bdc3c7; overflow-x: auto; touch-action: pan-x pan-y pinch-zoom; }
        
        /* View Toggles */
        .view-controls { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
